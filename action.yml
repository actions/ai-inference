name: 'AI Inference'
description: Generate an AI response based on a provided prompt
author: 'GitHub'

# Add your action's branding here. This will appear on the GitHub Marketplace.
branding:
  icon: 'message-square'
  color: red

# Define your inputs here.
inputs:
  prompt:
    description: The prompt for the model
    required: false
    default: ''
  prompt-file:
    description: Path to a file containing the prompt (supports .txt and .prompt.yml
      formats)
    required: false
    default: ''
  input:
    description: Template variables in YAML format for .prompt.yml files
    required: false
    default: ''
  file_input:
    description: Template variables in YAML format mapping variable names to file paths. The file contents will be used for templating.
    required: false
    default: ''
  model:
    description: The model to use. Must be a model the Copilot CLI accepts (e.g. "gpt-4.1", "claude-sonnet-4.5"). Set to an empty string to let the Copilot CLI pick its default.
    required: false
    default: 'gpt-4.1'
  system-prompt:
    description: The system prompt for the model
    required: false
    default: 'You are a helpful assistant'
  system-prompt-file:
    description: Path to a file containing the system prompt
    required: false
    default: ''
  token:
    description: The token to use
    required: false
    default: ${{ github.token }}
  provider:
    description: 'Inference provider to use. Only "copilot" is supported; the action shells out to the GitHub Copilot CLI, which must be installed and authenticated on the runner before this action runs (see README for an example workflow).'
    required: false
    default: 'copilot'
  copilot-cli-path:
    description: 'Path to the Copilot CLI binary. Defaults to "copilot" on PATH.'
    required: false
    default: ''
  copilot-allow-tools:
    description: 'Comma-separated list of tools to allow (passed through as --allow-tool). Example: "shell(git:*),write".'
    required: false
    default: ''

# Define your outputs here.
outputs:
  response:
    description: The response from the model
  response-file:
    description: The file path where the response is saved

runs:
  using: node24
  main: dist/index.js
